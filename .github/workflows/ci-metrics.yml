name: CI Metrics Experiment

on:
  push:
    branches:
      - main
      - experimento-ci-metricas
      - experimento-ci-base-livre
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  read-config:
    name: read-config
    runs-on: ubuntu-latest
    outputs:
      scenario: ${{ steps.config.outputs.scenario }}
      execution_mode: ${{ steps.config.outputs.execution_mode }}
      cache_buster: ${{ steps.config.outputs.cache_buster }}
      extra_test_cases: ${{ steps.config.outputs.extra_test_cases }}
      slow_test_ms: ${{ steps.config.outputs.slow_test_ms }}
      intentional_failure: ${{ steps.config.outputs.intentional_failure }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read experiment config
        id: config
        run: python scripts/read_experiment_config.py

  quality-sequential:
    name: quality-sequential
    needs: read-config
    if: needs.read-config.outputs.execution_mode == 'sequential'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore pip cache
        id: pip-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}-${{ needs.read-config.outputs.cache_buster }}

      - name: Prepare artifacts
        run: mkdir -p artifacts

      - name: Install dependencies
        run: python scripts/ci_step.py --name install_dependencies -- python -m pip install -e ".[dev]"

      - name: Lint
        run: python scripts/ci_step.py --name lint -- python -m ruff check src tests scripts

      - name: Tests
        run: python scripts/ci_step.py --name tests -- python -m pytest -q --junitxml=artifacts/junit.xml

      - name: Summarize job
        if: always()
        env:
          CACHE_HIT: ${{ steps.pip-cache.outputs.cache-hit }}
          CI_JOB_NAME: quality-sequential
        run: python scripts/summarize_tests.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-results-quality-sequential-${{ github.run_id }}
          path: artifacts

      - name: Enforce status
        if: always()
        run: python scripts/enforce_ci_status.py

  lint-parallel:
    name: lint-parallel
    needs: read-config
    if: needs.read-config.outputs.execution_mode == 'parallel'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore pip cache
        id: pip-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}-${{ needs.read-config.outputs.cache_buster }}

      - name: Prepare artifacts
        run: mkdir -p artifacts

      - name: Install dependencies
        run: python scripts/ci_step.py --name install_dependencies -- python -m pip install -e ".[dev]"

      - name: Lint
        run: python scripts/ci_step.py --name lint -- python -m ruff check src tests scripts

      - name: Summarize job
        if: always()
        env:
          CACHE_HIT: ${{ steps.pip-cache.outputs.cache-hit }}
          CI_JOB_NAME: lint-parallel
        run: python scripts/summarize_tests.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-results-lint-parallel-${{ github.run_id }}
          path: artifacts

      - name: Enforce status
        if: always()
        run: python scripts/enforce_ci_status.py

  tests-parallel:
    name: tests-parallel
    needs: read-config
    if: needs.read-config.outputs.execution_mode == 'parallel'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore pip cache
        id: pip-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}-${{ needs.read-config.outputs.cache_buster }}

      - name: Prepare artifacts
        run: mkdir -p artifacts

      - name: Install dependencies
        run: python scripts/ci_step.py --name install_dependencies -- python -m pip install -e ".[dev]"

      - name: Tests
        run: python scripts/ci_step.py --name tests -- python -m pytest -q --junitxml=artifacts/junit.xml

      - name: Summarize job
        if: always()
        env:
          CACHE_HIT: ${{ steps.pip-cache.outputs.cache-hit }}
          CI_JOB_NAME: tests-parallel
        run: python scripts/summarize_tests.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-results-tests-parallel-${{ github.run_id }}
          path: artifacts

      - name: Enforce status
        if: always()
        run: python scripts/enforce_ci_status.py
